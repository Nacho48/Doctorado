<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de interacciones · animación conceptual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080C0B; --panel:#0D1412; --screen:#070A09;
    --line:#1C2723; --line-2:#141D1A;
    --ink:#DCE8E2; --soft:#71827B; --faint:#47554F;
    --green:#35E29E; --blue:#4AA8F2; --violet:#9D8CE8; --silver:#C2D2E4;
    --amber:#F2B84C; --red:#F0604A; --user:#EDE4D2;
    --mono:"IBM Plex Mono","JetBrains Mono","SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --spd:0.45;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #0C1211 0%, var(--bg) 60%), var(--bg);
    color:var(--ink);font-family:var(--mono);font-weight:400;line-height:1.55;
    padding:38px 22px 60px;min-height:100vh;
  }
  .wrap{max-width:min(1480px,96vw);margin:0 auto}

  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:18px}
  .eyebrow{font-size:10.5px;letter-spacing:.32em;text-transform:uppercase;color:var(--faint);margin-bottom:12px;display:flex;align-items:center;gap:9px}
  .eyebrow::before{content:"";width:22px;height:1px;background:var(--line);display:inline-block}
  h1{font-size:clamp(20px,3.2vw,29px);font-weight:500;letter-spacing:-.01em;line-height:1.14;color:#EEF5F1}
  h1 em{font-style:normal;color:var(--soft);font-weight:300}
  .status{flex-shrink:0;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);
    border:1px solid var(--line);border-radius:7px;padding:10px 13px;display:flex;flex-direction:column;gap:7px;min-width:196px;background:rgba(255,255,255,.008)}
  .status .row1{display:flex;align-items:center;gap:8px}
  .led{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);transition:.3s}
  .led.oos{background:var(--red);box-shadow:0 0 9px var(--red)}
  .status b{color:var(--ink);font-weight:500}
  .status .sc{font-size:9.5px;letter-spacing:.12em;color:var(--faint);line-height:1.6}
  .langsw{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-bottom:11px}
  .langsw button{border:none;border-radius:0;padding:5px 11px;font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;background:transparent;color:var(--faint);gap:0}
  .langsw button:hover:not(:disabled){background:rgba(255,255,255,.03);color:var(--soft)}
  .langsw button.on{background:rgba(53,226,158,.09);color:#9fd9c0}
  .status .goal{color:var(--amber);font-weight:500;letter-spacing:.04em;text-transform:none;font-size:11px}

  /* conceptual banner */
  .banner{display:flex;align-items:flex-start;gap:11px;border:1px dashed #4a3a1c;background:rgba(242,184,76,.045);
    border-radius:9px;padding:11px 14px;margin-bottom:20px}
  .banner .bi{color:var(--amber);font-size:12px;line-height:1.4;flex-shrink:0}
  .banner .bt{font-size:11.5px;color:#c9a86e;line-height:1.6;font-weight:300}
  .banner .bt b{color:var(--amber);font-weight:600;letter-spacing:.12em;text-transform:uppercase;font-size:10.5px}

  .controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    border-top:1px solid var(--line-2);border-bottom:1px solid var(--line-2);padding:15px 2px;margin-bottom:18px}
  button{font-family:var(--mono);cursor:pointer;border-radius:8px;font-size:12.5px;letter-spacing:.02em;
    transition:.18s;border:1px solid var(--line);color:var(--ink);background:linear-gradient(180deg,#141C19,#0E1613);
    padding:11px 17px;display:inline-flex;align-items:center;gap:9px}
  button:hover:not(:disabled){border-color:#2b3a34;background:linear-gradient(180deg,#18211d,#101815)}
  button:active:not(:disabled){transform:translateY(1px)}
  button:disabled{opacity:.32;cursor:not-allowed;transform:none}
  button:focus-visible{outline:2px solid var(--soft);outline-offset:2px}
  button.primary{border-color:#25423a;color:#DFF7EC}
  button.primary:hover:not(:disabled){border-color:#2f5a4c}
  button.primary .arm{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);display:none}
  button.primary.armed .arm{display:inline-block}
  button.ghost{color:var(--soft);background:transparent}
  button.ghost:hover:not(:disabled){color:var(--ink)}
  button.nav{padding:9px 13px;font-size:14px;line-height:1}

  .intsel{display:inline-flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:8px;
    overflow:hidden;background:rgba(255,255,255,.006)}
  .intsel .isl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
    padding:0 10px 0 12px;white-space:nowrap}
  .intsel .isb{border:none;border-left:1px solid var(--line-2);border-radius:0;padding:10px 12px;
    font-size:11.5px;background:transparent;color:var(--soft);gap:0;white-space:nowrap}
  .intsel .isb:hover:not(:disabled){background:rgba(255,255,255,.03);color:var(--ink)}
  .intsel .isb.on{background:rgba(242,184,76,.1);color:#e0a94e}
  .switch{display:inline-flex;align-items:center;gap:10px;cursor:pointer;user-select:none;
    border:1px solid var(--line);border-radius:8px;padding:9px 13px;transition:.18s;background:rgba(255,255,255,.006)}
  .switch:hover{border-color:#2b3a34}
  .switch.on{border-color:#5a2a22;background:rgba(240,96,74,.05)}
  .switch.step.on{border-color:#2f4a5e;background:rgba(74,168,242,.05)}
  .switch input{position:absolute;opacity:0;width:0;height:0}
  .track-sw{width:33px;height:18px;border-radius:20px;background:#1b2320;position:relative;transition:.2s;flex-shrink:0;border:1px solid var(--line-2)}
  .knob{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--soft);transition:.2s}
  .switch.on .track-sw{background:rgba(240,96,74,.22);border-color:#5a2a22}
  .switch.on .knob{left:17px;background:var(--red);box-shadow:0 0 8px var(--red)}
  .switch.step.on .track-sw{background:rgba(74,168,242,.2);border-color:#2f4a5e}
  .switch.step.on .knob{background:var(--blue);box-shadow:0 0 8px var(--blue)}
  .switch .lab{font-size:12px;color:var(--soft);line-height:1.25}
  .switch.on .lab{color:#E9AFA4}
  .switch.step.on .lab{color:#9CC6EC}
  .switch .lab small{display:block;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint)}
  .switch.on .lab small{color:#a85f52}
  .switch.step.on .lab small{color:#5d87ab}

  .navgrp{display:inline-flex;align-items:center;gap:8px;opacity:.35;pointer-events:none;transition:.2s}
  .navgrp.live{opacity:1;pointer-events:auto}
  .stepc{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);min-width:74px;text-align:center}
  .stepc b{color:var(--ink);font-weight:500}
  .stepc small{display:block;font-size:8.5px;color:var(--faint);letter-spacing:.06em;text-transform:none;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:120px;margin:0 auto}

  .spacer{flex:1}
  .speed{display:flex;align-items:center;gap:8px}
  .speed .sp-lab{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint)}
  .speed .sp-val{font-size:10.5px;color:var(--soft);min-width:42px;text-align:right}
  .speed input[type=range]{width:106px;accent-color:var(--soft);cursor:pointer;background:transparent}
  .count{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);text-align:right;line-height:1.5}
  .count b{color:var(--soft);font-weight:500}

  .legend{display:flex;flex-wrap:wrap;gap:7px 15px;margin-bottom:13px;font-size:10.5px;color:var(--soft)}
  .lg{display:inline-flex;align-items:center;gap:6px}
  .chip{width:9px;height:9px;border-radius:2px;flex-shrink:0}
  .chip.g{background:var(--green)} .chip.b{background:var(--blue)} .chip.i{background:var(--violet)}
  .chip.l{background:var(--silver)} .chip.a{background:var(--amber)} .chip.r{background:var(--red)}
  .chip.u{background:var(--user)}

  .ledger-wrap{border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,var(--panel),#0A1210);overflow:hidden}
  .ledger-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--line-2);
    font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  .ledger{max-height:47vh;overflow-y:auto;overflow-x:auto;padding:8px 16px 14px;scroll-behavior:smooth}
  .ledger::-webkit-scrollbar{height:8px;width:8px}
  .ledger::-webkit-scrollbar-thumb{background:#1b2320;border-radius:8px}
  .hint{color:var(--faint);font-size:12px;padding:26px 4px;text-align:center;font-weight:300}

  .block{border-bottom:1px dashed var(--line-2);padding:4px 0 6px 8px;width:max-content;min-width:100%;cursor:pointer;
    border-left:2px solid transparent;margin-left:-8px;transition:background .18s,border-color .18s;
    animation:rowIn .34s cubic-bezier(.3,.9,.4,1) both}
  .block:hover{background:rgba(255,255,255,.012)}
  .block.sel{border-left-color:var(--soft);background:rgba(255,255,255,.018)}
  .block.pert{border-left-color:rgba(240,96,74,.35)}
  .block.pert.sel{border-left-color:var(--red)}
  .block:last-child{border-bottom:none}
  .block.out{animation:rowOut .3s ease forwards}
  @keyframes rowIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes rowOut{to{opacity:0;transform:translateY(-6px)}}

  .row{display:flex;align-items:flex-start;gap:12px;padding:7px 0}
  .gutter{flex-shrink:0;width:76px;padding-top:4px;display:flex;flex-direction:column;gap:5px}
  .gutter .idx{font-size:12.5px;color:var(--ink);font-weight:500;letter-spacing:.04em}
  .gutter .mode{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);border:1px solid var(--line);
    border-radius:5px;padding:2px 5px;width:fit-content;line-height:1.4}
  .gutter .mode.oos{color:#E9AFA4;border-color:#5a2a22;background:rgba(240,96,74,.06)}

  .track{display:inline-flex;align-items:flex-start;width:max-content;position:relative;padding-top:58px;padding-bottom:34px}
  .pulse{position:absolute;top:89px;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:5}
  .pulse.fwd{background:#EAF3EF;box-shadow:0 0 8px 2px rgba(234,243,239,.6)}
  .pulse.ret{width:10px;height:10px;background:var(--blue);box-shadow:0 0 10px 3px rgba(74,168,242,.6)}
  .pulse.ret.alarm{background:var(--red);box-shadow:0 0 11px 3px rgba(240,96,74,.65)}

  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;padding:2px 2px 0;flex-shrink:0;
    opacity:0;transform:translateY(6px) scale(.95);transition:opacity .28s ease, transform .28s cubic-bezier(.3,.9,.4,1)}
  .cell.in{opacity:1;transform:none}
  .cell.drop{transform:translateY(-18px) scale(.95)}
  .cell.drop.in{transform:none;transition:opacity .3s ease, transform .42s cubic-bezier(.3,1.3,.4,1)}
  .frame{width:62px;height:62px;border-radius:9px;background:var(--screen);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.4)}
  .cell.g .frame{border-color:rgba(53,226,158,.28)}
  .cell.b .frame{border-color:rgba(74,168,242,.28)}
  .cell.i .frame{border-color:rgba(157,140,232,.32)}
  .cell.l .frame{border-color:rgba(194,210,228,.3)}
  .cell.a .frame{border-color:rgba(242,184,76,.3)}
  .cell.r .frame{border-color:rgba(240,96,74,.42)}
  .cell.u .frame{border-color:rgba(237,228,210,.42);border-width:1.5px;background:#0B0A08}
  .cell.oosz .frame{background:#0B0906;box-shadow:inset 0 0 0 1px rgba(0,0,0,.4),inset 0 0 22px rgba(242,184,76,.035)}
  .mini{width:56px;height:56px;display:block}
  .cap{font-size:8.5px;letter-spacing:.02em;color:var(--soft);white-space:normal;font-weight:300;width:76px;text-align:center;line-height:1.35}
  .cell.g .cap{color:#7fbfa6} .cell.b .cap{color:#7fabd0} .cell.i .cap{color:#a99ad6}
  .cell.l .cap{color:#9fb0c2} .cell.a .cap{color:#c9a86e} .cell.r .cap{color:#d68a7b}
  .cell.u .cap{color:#cfc6b4}

  .conn{align-self:flex-start;color:var(--faint);font-size:14px;padding:0 3px;height:66px;display:flex;align-items:center;
    animation:fadeIn .3s ease both}
  .conn.red{color:var(--red)}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .zdiv{align-self:flex-start;height:104px;display:flex;align-items:stretch;gap:4px;padding:0 8px;animation:fadeIn .3s ease both;flex-shrink:0;position:relative}
  .zdiv .zl,.zdiv .zr{font-size:8px;letter-spacing:.2em;text-transform:uppercase;display:flex;align-items:center;
    writing-mode:vertical-rl;padding:5px 2px;border-radius:4px;font-weight:500}
  .zdiv .zl{color:#7fbfa6;transform:rotate(180deg);background:rgba(53,226,158,.06)}
  .zdiv .zr{color:#e0a94e;background:rgba(242,184,76,.07)}
  .zdiv .vline{width:2px;background:linear-gradient(180deg,transparent,#3b4a44 10%,#55665e 50%,#3b4a44 90%,transparent)}

  .zonebar{display:none;align-items:stretch;width:max-content;min-width:100%;position:sticky;top:0;z-index:6;
    margin:-8px -16px 6px;padding:9px 16px 8px;background:linear-gradient(180deg,#0D1412 78%,rgba(13,20,18,0));gap:0}
  .zonebar .zb{font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;padding:6px 10px;border-radius:5px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .zonebar .zb small{display:block;font-size:8px;letter-spacing:.06em;text-transform:none;font-weight:300;opacity:.72;margin-top:1px}
  .zonebar .zb-is{color:#7fbfa6;background:rgba(53,226,158,.055);border:1px solid rgba(53,226,158,.16);flex-shrink:0}
  .zonebar .zb-oos{color:#e0a94e;background:rgba(242,184,76,.06);border:1px solid rgba(242,184,76,.18);margin-left:6px;flex:1}

  .arclab{position:absolute;font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;pointer-events:none;
    white-space:nowrap;z-index:7;opacity:0;transition:opacity .35s ease;
    background:rgba(7,10,9,.92);padding:2px 6px;border-radius:3px;line-height:1.2}
  .arclab.in{opacity:.9}
  .domlab{position:absolute;font-size:7px;letter-spacing:.18em;text-transform:uppercase;pointer-events:none;
    text-align:center;color:var(--faint);z-index:7;opacity:0;transition:opacity .4s ease;line-height:1.2}
  .domlab.in{opacity:.95}
  .cyclab{position:absolute;font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;pointer-events:none;
    white-space:nowrap;z-index:7;opacity:0;transition:opacity .4s ease;color:#a99ad6;
    background:rgba(7,10,9,.92);padding:2px 6px;border-radius:3px;line-height:1.2}
  .cyclab.in{opacity:.95}

  .servoBox{width:56px;height:56px;display:flex;flex-direction:column;justify-content:center;gap:7px;padding:2px 3px}
  .sv{display:flex;flex-direction:column;gap:2px}
  .sv .l1{display:flex;align-items:center;gap:4px}
  .sv .nm{font-size:7.5px;color:#7fabd0;width:8px;flex-shrink:0}
  .sv .tk{flex:1;height:4.5px;background:#131b22;border-radius:3px;overflow:hidden}
  .sv .tk>i{display:block;height:100%;width:0%;background:var(--blue);border-radius:3px;transition:width calc(.95s / var(--spd,1)) cubic-bezier(.3,.9,.35,1)}
  .sv .l2{display:flex;align-items:center;gap:4px;padding-left:12px}
  .sv .tk2{flex:1;height:2.5px;background:#131b22;border-radius:3px;overflow:hidden}
  .sv .tk2>i{display:block;height:100%;width:0%;background:rgba(74,168,242,.45);border-radius:3px;transition:width calc(.95s / var(--spd,1)) cubic-bezier(.3,.9,.35,1)}
  .sv .rd{font-size:6.5px;color:#5d7891;width:20px;text-align:right;flex-shrink:0}

  .tag{align-self:flex-start;height:66px;display:flex;align-items:center;margin-left:7px;
    font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;animation:fadeIn .3s ease both}
  .tag.red{color:var(--red)} .tag.blue{color:var(--blue)}

  .ring{position:absolute;pointer-events:none;overflow:visible;z-index:3}
  .retro{position:absolute;pointer-events:none;overflow:visible;z-index:4}

  @keyframes blink{0%,55%{opacity:1}56%,100%{opacity:.12}}
  .recdot{animation:blink 1.1s steps(1) infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinRing{transform-origin:32px 32px;animation:spin 2.4s linear infinite}
  @keyframes irisPulse{0%,100%{r:5.4}50%{r:3.6}}

  .console{margin-top:18px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,var(--panel),#0A1210);overflow:hidden}
  .console-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--line-2);
    font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  .console-body{padding:12px 16px 16px;min-height:60px;height:auto;overflow:auto;resize:vertical;background:var(--screen)}
  .cline{font-size:11.5px;color:var(--soft);line-height:1.7;font-weight:300;display:flex;gap:9px;
    opacity:0;transform:translateY(3px);transition:opacity .25s ease,transform .25s ease}
  .cline.in{opacity:1;transform:none}
  .cline .m{color:var(--faint);flex-shrink:0}
  .cline b{color:var(--ink);font-weight:500}
  .cline .vg{color:#7fbfa6}.cline .vb{color:#7fabd0}.cline .vi{color:#a99ad6}
  .cline .vl{color:#9fb0c2}.cline .va{color:#c9a86e}.cline .vr{color:#d68a7b}
  .cline .vu{color:#d8cfbd}
  .cempty{color:var(--faint);font-size:11.5px;font-weight:300}

  .tree-panel{margin-top:20px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,var(--panel),#0A1210);padding:16px 18px 18px}
  .tree-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
  .tree-title{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint)}
  .tree-sub{font-size:11px;color:var(--soft);font-weight:300}
  .treesvg{width:100%;height:auto;max-height:200px;display:block}

  .tbl-panel{margin-top:20px;border:1px solid var(--line);border-radius:12px;
    background:linear-gradient(180deg,var(--panel),#0A1210);padding:16px 18px 18px}
  .tbl-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  .tbl-title{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint)}
  .tbl-sub{font-size:11px;color:var(--soft);font-weight:300}
  .tbl-scroll{overflow-x:auto}
  table.log{border-collapse:collapse;width:100%;font-size:10.5px;font-weight:300;min-width:940px}
  table.log th{text-align:left;font-weight:500;font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;
    color:var(--faint);padding:0 9px 7px;border-bottom:1px solid var(--line-2);white-space:nowrap;vertical-align:bottom}
  table.log td{padding:7px 9px;border-bottom:1px dashed var(--line-2);color:var(--soft);vertical-align:top;line-height:1.45}
  table.log tr:last-child td{border-bottom:none}
  table.log .c-n{color:var(--ink);font-weight:500;white-space:nowrap}
  table.log .c-want{color:#d8cfbd}
  table.log .c-sens{color:#7fbfa6;white-space:nowrap}
  table.log .c-serv{color:#7fabd0;white-space:nowrap}
  table.log .c-pri{color:#a99ad6}
  table.log .c-ges{color:#c9a86e}
  table.log .c-cam,table.log .c-say{color:#9fb0c2;white-space:nowrap}
  table.log th.c-res,table.log td.c-res{border-left:2px solid rgba(242,184,76,.45);
    background:rgba(242,184,76,.05);color:var(--amber);font-weight:500;text-align:center;white-space:nowrap}
  table.log th.c-res{color:#e0a94e}
  table.log tr.pert td:first-child{box-shadow:inset 3px 0 0 rgba(240,96,74,.55)}
  table.log .pa,table.log .pb{display:inline-block;white-space:nowrap}
  table.log .pa{opacity:.62}
  table.log .pb{margin-top:2px}
  table.log .pfx{color:var(--faint);font-size:8.5px;letter-spacing:.1em;margin-right:4px}
  table.log tr.pert .pb .pfx{color:#a85f52}

<script>
const NS="http://www.w3.org/2000/svg";
const FONT="IBM Plex Mono, ui-monospace, monospace";
const C={green:"#35E29E",blue:"#4AA8F2",violet:"#9D8CE8",silver:"#C2D2E4",amber:"#F2B84C",red:"#F0604A",user:"#EDE4D2",soft:"#71827B"};
const WINDOW=6, RAIL=494, DWELL=230;
const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
const $=s=>document.querySelector(s);

let speed=0.45;
const T=ms=>ms/speed;
const wait=ms=>new Promise(r=>setTimeout(r,reduce?0:T(ms)));

const ledger=$("#ledger"), treeG=$("#treeG"), consoleBody=$("#consoleBody");
const btnNew=$("#btnNew"), btnReset=$("#btnReset"), chk=$("#chkPert"), sw=$("#sw");
const chkStep=$("#chkStep"), swStep=$("#swStep"), navgrp=$("#navgrp");
const btnPrev=$("#btnPrev"), btnNext=$("#btnNext"), stepNum=$("#stepNum"), stepLab=$("#stepLab");
const led=$("#led"), modeTxt=$("#modeTxt"), primTxt=$("#primTxt"), goalTxt=$("#goalTxt");
const cIter=$("#cIter"), cOos=$("#cOos"), treeSub=$("#treeSub");

let iter=0, oos=0, perturb=false, stepMode=true, anim=false, selBlock=null;
let cur=null;                 // {block,d,steps,ctxs,idx}
const strat=[], blockData=new Map();
let session=null;

/* ---------- helpers ---------- */
function el(t,a,p){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;}
function div(c,t){const d=document.createElement("div");if(c)d.className=c;if(t!=null)d.textContent=t;return d;}
function mini(){return el("svg",{viewBox:"0 0 64 64",class:"mini"});}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
function flashCell(track,idx,col){
  const c=[...track.querySelectorAll(".cell")][idx];if(!c)return;
  const f=c.querySelector(".frame");if(!f)return;
  const old=f.style.boxShadow;
  f.style.transition="box-shadow .2s ease";
  f.style.boxShadow="0 0 0 2px "+col+", 0 0 16px "+col+"66";
  setTimeout(()=>{f.style.boxShadow=old;},reduce?0:T(430));
}
function autoscroll(){ledger.scrollTop=ledger.scrollHeight;}
function syncZoneBar(){
  const bar=$("#zonebar"),z=ledger.querySelector(".zdiv");
  if(!z){bar.style.display="none";return;}
  bar.style.display="flex";
  const w=z.getBoundingClientRect().left-bar.getBoundingClientRect().left;
  if(w>40)$("#zbIs").style.width=w+"px";
}
window.addEventListener("resize",syncZoneBar);

/* ---------- i18n ---------- */
let LANG="es";
const B=(es,en)=>({es,en});                 // par bilingüe
const tx=o=>o[LANG];                        // resolver par
const mk=f=>{const a=f("es"),b=f("en");return ()=>LANG==="es"?a:b;};   // thunk bilingüe
const I18N=[];                              // nodos dinámicos re-traducibles
function reg(el,f){el._f=f;I18N.push(el);el.textContent=f();return el;}
function regHTML(el,f){el._fh=f;I18N.push(el);el.innerHTML=f();return el;}
function retranslate(){
  for(let i=I18N.length-1;i>=0;i--){
    const e=I18N[i];
    if(!e.isConnected){I18N.splice(i,1);continue;}
    if(e._fh)e.innerHTML=e._fh();else if(e._f)e.textContent=e._f();
  }
}

/* ---------- domain ----------
   La prensión NO abre secuencia: es primitiva principal pero encadenada,
   siempre posterior a un alcance / empuje / tracción. */
const PRIMS={
  empujar:{label:B("empujar","push"),musc:B("pectoral mayor","pectoralis major"),
    musc2:B("deltoides anterior","anterior deltoid"),sub:B("extender la muñeca","extending the wrist"),
    otra:B("traccionar","pull"),otraKey:"traccionar",ger:B("empuja","pushes")},
  traccionar:{label:B("traccionar","pull"),musc:B("dorsal ancho","latissimus dorsi"),
    musc2:B("deltoides posterior","posterior deltoid"),sub:B("orientar la muñeca","orienting the wrist"),
    otra:B("empujar","push"),otraKey:"empujar",ger:B("tracciona","pulls")}
};
/* tres intenciones declarables, todas sobre el mismo objeto */
const TASKS=[
  {key:"empujar",dir:"push",holds:false,task:B("empujar la pelota","push the ball"),
   opts:[B("empuje rasante","low push"),B("empuje con extensión de codo","push with elbow extension"),B("empuje sostenido","sustained push")]},
  {key:"empujar",dir:"lift",holds:true,task:B("levantar la pelota","lift the ball"),
   opts:[B("elevación frontal","frontal elevation"),B("elevación con codo flexionado","elevation with flexed elbow"),B("elevación lateral","lateral elevation")]},
  {key:"traccionar",dir:"pull",holds:true,task:B("traccionar la pelota","pull the ball"),
   opts:[B("tracción al cuerpo","pull to the body"),B("arrastre sobre la mesa","drag across the table"),B("tracción sostenida","sustained pull")]}
];
const PKEYS=Object.keys(PRIMS);          // la prensión queda fuera del sorteo inicial
const GRP=[{es:"pectoral",en:"pectoralis",ab:"PEC"},{es:"deltoides",en:"deltoid",ab:"DEL"},
           {es:"dorsal",en:"latissimus",ab:"DOR"},{es:"lumbar",en:"lumbar",ab:"LUM"}];
const MIN_SHARE=6;
function normMix(m){
  m=m.map(v=>Math.max(MIN_SHARE,Math.round(v)));
  const t=m.reduce((a,b)=>a+b,0);
  m=m.map(v=>Math.round(v/t*100));
  m[0]+=100-m.reduce((a,b)=>a+b,0);
  return m;
}
/* Secuencia de repartos a lo largo de UN gesto.
   Ningún grupo se apaga nunca: el lumbar se adelanta (ajuste postural
   anticipatorio), el motor primario alcanza su meseta y el sinergista
   va tomando relevo. Cambia el equilibrio, no el conjunto. */
function genMixSeq(key){
  const prime=key==="empujar"?0:2, syn=1, ant=3, other=key==="empujar"?2:0;
  const seq=[];
  const m0=[0,0,0,0];
  m0[prime]=rnd(24,30); m0[syn]=rnd(12,17); m0[other]=rnd(8,12); m0[ant]=rnd(20,26);
  seq.push(normMix(m0));
  let cur=m0.slice();
  for(let i=0;i<CYCLES;i++){
    const n=cur.slice();
    n[prime]-=rnd(2,6);
    n[syn]  +=rnd(4,9);
    n[ant]  -=rnd(2,5);
    n[other]+=rnd(0,3);
    seq.push(normMix(n));
    cur=n;
  }
  return seq;
}
const mixTxt=(m,l)=>GRP.map((g,i)=>`${g[l]} ${m[i]}%`).join(" · ");
const mixShort=m=>GRP.map((g,i)=>`${g.ab[0]}${m[i]}`).join(" ");
const mixShift=(a,b,l)=>{
  const idx=[0,1,2,3].map(i=>({i,d:b[i]-a[i]})).sort((x,y)=>Math.abs(y.d)-Math.abs(x.d)).slice(0,2);
  return idx.map(o=>`${GRP[o.i][l]} ${a[o.i]}→${b[o.i]}%`).join(", ");
};
const GROUPS=B("pectoral · dorsal · deltoides · lumbar","pectoralis · latissimus · deltoid · lumbar");
const CYCLES=2;

function updateSessionUI(){
  primTxt.textContent="«"+tx(session.prim.label)+"»"+(session.holds?(LANG==="es"?" + prensión":" + grasp"):"");
  goalTxt.textContent="«"+tx(session.task)+"»";
}
let fixedTask=-1;
function pickExample(){
  let tIdx;
  if(fixedTask>=0)tIdx=fixedTask;
  else{
    const prev=session?session.tIdx:-1;
    const pool=TASKS.map((_,i)=>i).filter(i=>i!==prev);
    tIdx=pool[rnd(0,pool.length-1)];
  }
  const t=TASKS[tIdx];
  session={tIdx,key:t.key,prim:PRIMS[t.key],dir:t.dir,goal:rnd(0,2),holds:t.holds,task:t.task,opts:t.opts};
  updateSessionUI();
}
function newSession(){session=null;pickExample();}
function jitter(v,d,lo,hi){return Math.max(lo,Math.min(hi,v+rnd(-d,d)));}
function genPass(){
  const fin=[0,1,2].map(()=>({ang:rnd(12,84),pow:rnd(25,92)}));
  const mix=genMixSeq(session.key);
  const cyc=[];
  for(let i=0;i<CYCLES;i++)cyc.push({
    servos:[0,1,2].map((_,j)=>({ang:jitter(fin[j].ang,10,6,90),pow:jitter(fin[j].pow,12,15,98)})),
    da:[-18,0,18][rnd(0,2)]
  });
  return{
    cycles:cyc,
    mix,
    coarse:fin.map(s=>({ang:jitter(s.ang,14,6,90),pow:jitter(s.pow,18,15,98)})),
    servos:fin,
    heat:{cx:Math.random()*4,cy:Math.random()*4,sig:1+Math.random()*.5},
    drop:shuffle([0,1,2].filter(i=>i!==session.goal))[0]
  };
}
function genData(pert){
  const d={n:iter,pert,prim:session.prim,goal:session.goal,ex:session,p1:genPass()};
  if(pert)d.p2=genPass();
  return d;
}

/* ---------- glyphs ---------- */
function buildMesh(mix){
  const s=mini();
  const mx=Math.max(...mix);
  GRP.forEach((g,i)=>{
    const col=i%2,row=(i/2)|0,zx=3+col*30,zy=4+row*19;
    const sh=mix[i],k=sh/mx;
    const lb=el("text",{x:zx+1,y:zy+4,fill:"#3f5a50","font-size":3.6,"font-family":FONT,"letter-spacing":".3"},s);
    lb.textContent=g.ab;
    const pc=el("text",{x:zx+26,y:zy+4,fill:"#4d7365","font-size":3.8,"font-family":FONT,"text-anchor":"end"},s);
    pc.textContent=sh+"%";
    for(let r=0;r<2;r++)for(let c=0;c<3;c++){
      const cx=zx+8+c*7,cy=zy+8+r*6.5;
      const jit=(Math.sin(i*7+r*3+c)*0.5+0.5)*0.22;      // textura, no ruido real
      const o=Math.max(.14,Math.min(1,k*(0.82+jit)));
      const d=el("circle",{cx:cx.toFixed(1),cy:cy.toFixed(1),r:(1.3+k*1.1).toFixed(2),
        fill:C.green,opacity:o.toFixed(2)},s);
      if(k>.85)d.style.filter="drop-shadow(0 0 2px "+C.green+")";
    }
  });
  // barra de reparto: la suma siempre es el gesto completo
  let x=4;const W=56;
  mix.forEach((v,i)=>{
    const w=W*v/100;
    el("rect",{x:x.toFixed(1),y:45,width:Math.max(.8,w-.7).toFixed(1),height:3.4,rx:1,
      fill:C.green,opacity:(.3+.7*(v/mx)).toFixed(2)},s);
    x+=w;
  });
  const u=el("text",{x:32,y:58,fill:"#4d7365","font-size":5.2,"font-family":FONT,"text-anchor":"middle",
    textLength:36,lengthAdjust:"spacingAndGlyphs"},s);
  u.textContent="\u00b5V \u00b7 crudo";
  return s;
}
function buildHeat(h){
  const s=mini(),N=5,cell=8.4,m=2.5;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const v=Math.exp(-(((c-h.cx)**2+(r-h.cy)**2)/(2*h.sig*h.sig))),a=Math.max(.05,Math.min(1,v));
    el("rect",{x:(m+c*cell+.8).toFixed(1),y:(m+r*cell+.8).toFixed(1),width:cell-1.6,height:cell-1.6,rx:1.6,
      fill:"rgba(74,168,242,"+a.toFixed(3)+")"},s);
  }
  // onda limpia con las marcas de latencia · meseta · pico
  el("path",{d:"M 3 55 L 14 55 L 19 49 L 33 49 L 39 45 L 44 49 L 50 55 L 61 55",
    fill:"none",stroke:C.blue,"stroke-width":1.1,opacity:.85,"stroke-linejoin":"round","stroke-linecap":"round"},s);
  [14,26,39].forEach(x=>el("line",{x1:x,y1:42,x2:x,y2:57,stroke:C.blue,"stroke-width":.6,opacity:.4,
    "stroke-dasharray":"1.5 1.5"},s));
  const t=el("text",{x:32,y:62.5,fill:"#5d87ab","font-size":4.4,"font-family":FONT,"text-anchor":"middle",
    textLength:58,lengthAdjust:"spacingAndGlyphs"},s);
  t.textContent="latencia \u00b7 meseta \u00b7 pico";
  return s;
}
// vocabulario motor: primitivas principales arriba, prensión encadenada abajo
function renderPrimitive(svg,activeKey,chained){
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const lanes=[["empujar",13],["traccionar",30]];
  lanes.forEach(([k,y])=>{
    const on=k===activeKey,col=on?C.violet:"#4b4668";
    const g=el("g",{opacity:on?1:.2},svg);
    if(on)el("rect",{x:2,y:y-8,width:60,height:16,rx:4,fill:"rgba(157,140,232,.1)",stroke:"rgba(157,140,232,.35)","stroke-width":.7},g);
    el("rect",{x:9,y:y-5,width:4,height:10,rx:1.4,fill:col},g);
    if(k==="empujar"){
      el("line",{x1:16,y1:y,x2:40,y2:y,stroke:col,"stroke-width":1.5},g);
      el("path",{d:`M 37 ${y-3.2} L 42 ${y} L 37 ${y+3.2} Z`,fill:col},g);
    }else{
      el("line",{x1:18,y1:y,x2:42,y2:y,stroke:col,"stroke-width":1.5},g);
      el("path",{d:`M 21 ${y-3.2} L 16 ${y} L 21 ${y+3.2} Z`,fill:col},g);
    }

/* prior biomecánico: abanico de gestos admisibles bajo la primitiva.

function renderPrior(svg,d,stage,chain,drop){
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const px=13,py=52,len=40,ang=[-72,-46,-20];
  if(stage===3){
    const ML=32,base=ang[d.goal];
    const a=base*Math.PI/180,ex=px+Math.cos(a)*ML,ey=py+Math.sin(a)*ML;
    el("line",{x1:px,y1:py,x2:ex.toFixed(1),y2:ey.toFixed(1),stroke:C.amber,"stroke-width":2,opacity:.4},svg);
    el("rect",{x:(ex-2.7).toFixed(1),y:(ey-2.7).toFixed(1),width:5.4,height:5.4,rx:1.3,fill:C.amber,opacity:.55},svg);
    let cx0=ex,cy0=ey,acc=base,done=0;
    const LL=[9,6];
    (chain||[]).forEach((lk,j)=>{
      const ln=LL[j]||5;
      if(lk.open){
        [-18,0,18].forEach((da,i)=>{
          const r2=(acc+da)*Math.PI/180,sx=cx0+Math.cos(r2)*ln,sy=cy0+Math.sin(r2)*ln,on=i===1;
          el("line",{x1:cx0.toFixed(1),y1:cy0.toFixed(1),x2:sx.toFixed(1),y2:sy.toFixed(1),
            stroke:C.violet,"stroke-width":on?1.6:1.1,opacity:on?.95:.4},svg);
          el("circle",{cx:sx.toFixed(1),cy:sy.toFixed(1),r:on?2.2:1.5,fill:C.violet,opacity:on?1:.4},svg);
        });
      }else{
        const r2=(acc+lk.da)*Math.PI/180,sx=cx0+Math.cos(r2)*ln,sy=cy0+Math.sin(r2)*ln;
        el("line",{x1:cx0.toFixed(1),y1:cy0.toFixed(1),x2:sx.toFixed(1),y2:sy.toFixed(1),
          stroke:C.violet,"stroke-width":1.7,opacity:.8},svg);
        el("rect",{x:(sx-2).toFixed(1),y:(sy-2).toFixed(1),width:4,height:4,rx:1,fill:C.violet,opacity:.85},svg);
        cx0=sx;cy0=sy;acc+=lk.da;done++;
      }
    });
    el("circle",{cx:px,cy:py,r:2.6,fill:C.violet},svg);
    const t3=el("text",{x:px-7,y:60,fill:"#6b62a0","font-size":6.5,"font-family":FONT},svg);
    t3.textContent="eslab\u00f3n "+done+"/"+CYCLES;
    return svg;
  }
  let live=[0,1,2];
  if(stage===1)live=[0,1,2].filter(i=>i!==drop);
  if(stage===2)live=[d.goal];
  // sector admisible
  if(live.length>1){
    const a0=ang[Math.min(...live)]*Math.PI/180,a1=ang[Math.max(...live)]*Math.PI/180;
    el("path",{d:`M ${px} ${py} L ${(px+Math.cos(a0)*len).toFixed(1)} ${(py+Math.sin(a0)*len).toFixed(1)} A ${len} ${len} 0 0 1 ${(px+Math.cos(a1)*len).toFixed(1)} ${(py+Math.sin(a1)*len).toFixed(1)} Z`,
      fill:"rgba(157,140,232,.11)",stroke:"none"},svg);
  }
  ang.forEach((a,i)=>{
    const on=live.includes(i),goal=i===d.goal&&stage===2;
    const r=a*Math.PI/180,x=px+Math.cos(r)*len,y=py+Math.sin(r)*len;
    el("line",{x1:px,y1:py,x2:x.toFixed(1),y2:y.toFixed(1),stroke:goal?C.amber:C.violet,
      "stroke-width":goal?2:1.3,opacity:on?(goal?1:.75):.12,"stroke-dasharray":on?"none":"2 3"},svg);
    const c=el("circle",{cx:x.toFixed(1),cy:y.toFixed(1),r:goal?3.2:2.3,
      fill:on?(goal?C.amber:C.violet):"none",stroke:goal?C.amber:C.violet,"stroke-width":1,opacity:on?1:.14},svg);
    if(goal)c.style.filter="drop-shadow(0 0 4px "+C.amber+")";
  });
  el("circle",{cx:px,cy:py,r:2.6,fill:C.violet},svg);
  const t=el("text",{x:px+2,y:60,fill:"#6b62a0","font-size":6.5,"font-family":FONT},svg);
  t.textContent=stage===2?"1 vía":live.length+" vías";
  return svg;
}

  if(reduce){done=Promise.resolve();}
  else{
    [br,arc].forEach(el0=>{
      const L=el0.getTotalLength();
      el0.style.strokeDasharray=L+"px";el0.style.strokeDashoffset=L+"px";el0.getBoundingClientRect();
      el0.style.transition=`stroke-dashoffset ${(.8/speed).toFixed(2)}s ease`;
      requestAnimationFrame(()=>el0.style.strokeDashoffset="0px");
    });
    done=wait(820);
  }
  requestAnimationFrame(()=>lab.classList.add("in"));
  return{nodes:[svg,lab],done};
}
function pulseRow(track,alarm){
  if(reduce)return{node:null,done:Promise.resolve()};
  const w=track.scrollWidth;
  const fwd=div("pulse fwd");track.appendChild(fwd);
  const done=new Promise(res=>{
    const t0=performance.now(),D1=T(620);
    (function f(t){const k=Math.min(1,(t-t0)/D1);
      fwd.style.left=(k*w)+"px";fwd.style.opacity=k<.1?k*10:(k>.85?(1-k)/.15:1);
      if(k<1)requestAnimationFrame(f);else{fwd.remove();back();}})(performance.now());
    function back(){
      const ret=div("pulse ret"+(alarm?" alarm":""));track.appendChild(ret);
      const s0=performance.now(),D2=T(760);
      (function g(t){const k=Math.min(1,(t-s0)/D2);
        ret.style.left=((1-k)*w)+"px";ret.style.opacity=k<.1?k*10:(k>.85?(1-k)/.15:1);
        if(k<1)requestAnimationFrame(g);else{ret.remove();res();}})(performance.now());
    }
  });
  return{node:fwd,done};
}

/* ---------- step sequence ---------- */
function treeStep(d){
  return{label:"ruta registrada",narr:null,dur:120,mount:async()=>{
    strat.push({n:d.n,pert:d.pert});trimWindow();redrawTree();updateStatus();
    addLogRow(d);logRows[logRows.length-1]._n=d.n;
  },undo:()=>{
    removeLogRow(d.n);
    const i=strat.findIndex(s=>s.n===d.n);
    if(i>=0)strat.splice(i,1);
    redrawTree();updateStatus();
  }};
}
function buildSteps(d){
  const SS=d.ex, M=d.prim, steps=[];
  const PL=l=>M.label[l], MU=l=>M.musc[l], MU2=l=>M.musc2[l], SB=l=>M.sub[l],
        OT=l=>M.otra[l], MUO=l=>PRIMS[M.otraKey].musc[l], GE=l=>M.ger[l], TK=l=>SS.task[l],
        ON=(i,l)=>SS.opts[i][l], GR=l=>GROUPS[l];
  const sv=v=>`A/B/C ${v[0].ang}°, ${v[1].ang}°, ${v[2].ang}° (${v[0].pow}/${v[1].pow}/${v[2].pow}%)`;
  const ES=l=>l==="es";

  const cellStep=(label,narr,make)=>steps.push({label,narr,dur:DWELL,mount:async ctx=>{
    const{track,node,cap,accent,opts={}}=make();
    if(track.querySelector(".cell"))ctx.add(track,conn(opts.red));
    const w=wrapCell(node,cap,accent,opts.drop,opts.zone);ctx.add(track,w);
    autoscroll();requestAnimationFrame(()=>w.classList.add("in"));
  }});

  function langTail(getTrack,perturbed){
    steps.push({label:mk(l=>ES(l)?"capa de lenguaje":"language layer"),
      narr:mk(l=>perturbed
        ? (ES(l)
          ? `<span class="vu">capa de lenguaje</span> — <b>sin haberle enseñado el vídeo</b> se le pregunta solo por el resultado: «¿lo has conseguido?» → <b>sí</b>. <b>No se le pregunta por la perturbación</b>: si la menciona por su cuenta, se registra como comentario espontáneo.`
          : `<span class="vu">language layer</span> — <b>before showing any video</b>, only the outcome is asked: "did you manage it?" → <b>yes</b>. <b>The perturbation is never asked about</b>: if the subject brings it up unprompted, it is logged as a spontaneous remark.`)
        : (ES(l)
          ? `<span class="vu">capa de lenguaje</span> — <b>sin haberle enseñado el vídeo</b> se le pregunta: «¿notas que lo has conseguido?» → <b>sí</b>. Es lo único que puede decir si era <em>eso</em> lo que se quería.`
          : `<span class="vu">language layer</span> — <b>before showing any video</b>: "do you feel you achieved it?" → <b>yes</b>. This is the only thing that can tell whether <em>that</em> was what was wanted.`)),
      dur:DWELL,mount:async ctx=>{
        const track=getTrack();
        ctx.add(track,conn(false));
        const w=wrapCell(buildLang(perturbed),mk(l=>ES(l)?"capa de lenguaje · ¿era esto?":"language layer · was this it?"),'u',false,"oos");
        ctx.add(track,w);autoscroll();requestAnimationFrame(()=>w.classList.add("in"));
      }});
    steps.push({label:mk(l=>ES(l)?"aferencia · lenguaje → sujeto":"afference · language → subject"),
      narr:mk(l=>ES(l)
        ? `<span class="vu">catalogado</span> — coincide con la cámara: la tirada se archiva como <b>«${TK("es")}» · conseguido · confirmado</b>. Este es el lazo lento; aquí solo registra, no reescribe el mapeo.`
        : `<span class="vu">catalogued</span> — it agrees with the camera: the trial is filed as <b>"${TK("en")}" · achieved · confirmed</b>. This is the slow loop; here it only records, it does not rewrite the mapping.`),
      dur:140,mount:async ctx=>{
        const track=getTrack(),cells=track.querySelectorAll(".cell").length;
        const r=longArc(track,0,cells-1,{color:C.user,top:0,height:56,dur:1300,width:1.9,dash:"5 4",
          labX:0.26,labTop:0,label:mk(l=>ES(l)?"⟵ lazo lento · post-hoc":"⟵ slow loop · post-hoc")});
        ctx.nodes.push(...r.nodes);await r.done;
      }});
  }

  // ---- segmento in-sample ----
  function inSample(getTrack,pass,P,adapted,servoInit){
    steps.push({label:mk(l=>adapted?(ES(l)?"intención (sin cambios)":"intention (unchanged)"):(ES(l)?"intención declarada":"declared intention")),
      narr:mk(l=>adapted
        ? (ES(l)
          ? `<span class="vu">intención</span> — <b>no se vuelve a preguntar</b>: el objetivo declarado sigue siendo «${TK("es")}». Lo que cambia es la ruta, no lo que se quiere.`
          : `<span class="vu">intention</span> — <b>the subject is not asked again</b>: the declared goal is still "${TK("en")}". What changes is the route, not what is wanted.`)
        : (ES(l)
          ? `<span class="vu">intención</span> — antes de la tirada, el sujeto declara qué quiere hacer: <b>«${TK("es")}»</b>. Queda registrada y bloqueada; nada de lo que venga después puede reescribirla.`
          : `<span class="vu">intention</span> — before the trial, the subject declares what they want to do: <b>"${TK("en")}"</b>. It is logged and locked; nothing downstream can rewrite it.`)),
      dur:DWELL,mount:async ctx=>{
        const track=getTrack();
        if(track.querySelector(".cell"))ctx.add(track,conn(false));
        const w=wrapCell(buildIntent(),mk(l=>adapted?(ES(l)?"intención · sin cambios":"intention · unchanged"):(ES(l)?"intención declarada":"declared intention")),'u');
        ctx.add(track,w);autoscroll();requestAnimationFrame(()=>w.classList.add("in"));
      }});

    steps.push({label:mk(l=>adapted?(ES(l)?"malla · re-lectura":"mesh · re-read"):(ES(l)?"malla":"mesh")),
      narr:mk(l=>adapted
        ? (ES(l)
          ? `<span class="vg">malla</span> — tras el cambio, el reclutamiento se desplaza dentro de los mismos cuatro grupos: el reparto se reorganiza a <b>${mixTxt(pass.mix[0],"es")}</b>. Compensa el <b>${MU2("es")}</b> sin que ningún grupo se apague; la señal sigue siendo utilizable.`
          : `<span class="vg">mesh</span> — after the change, recruitment shifts within the same four groups: the balance reorganises to <b>${mixTxt(pass.mix[0],"en")}</b>. The <b>${MU2("en")}</b> compensates without any group switching off; the signal is still usable.`)
        : (ES(l)
          ? `<span class="vg">malla</span> — el usuario contrae el <b>${MU("es")}</b>. De los cuatro grupos que la malla cubre —${GR("es")}— <b>los cuatro están activos a la vez</b>; lo que la malla lee es el <b>reparto</b>: ${mixTxt(pass.mix[0],"es")}. El lumbar va por delante —ajuste postural anticipatorio— antes de que el motor primario alcance su meseta. Es <b>registro crudo, en microvoltios</b>: sucio, con deriva y <b>no estacionario entre sesiones</b>. Nada distal se mide aquí.`
          : `<span class="vg">mesh</span> — the user contracts the <b>${MU("en")}</b>. Of the four groups the mesh covers —${GR("en")}— <b>all four are active at once</b>; what the mesh reads is the <b>balance</b>: ${mixTxt(pass.mix[0],"en")}. The lumbar leads —anticipatory postural adjustment— before the prime mover reaches its plateau. This is <b>raw recording, in microvolts</b>: dirty, drifting and <b>non-stationary across sessions</b>. Nothing distal is measured here.`)),
      dur:DWELL,mount:async ctx=>{
        const track=getTrack(),svg=buildMesh(pass.mix[0]);
        ctx.add(track,conn(false));
        const w=wrapCell(svg,mk(l=>adapted?(ES(l)?"①′ malla adaptada":"①′ adapted mesh"):(ES(l)?"① malla":"① mesh")),'g');
        ctx.add(track,w);S["mesh"+P]=svg;autoscroll();requestAnimationFrame(()=>w.classList.add("in"));
      },undo:()=>{S["mesh"+P]=null;}});

    cellStep(mk(l=>adapted?(ES(l)?"activación adaptada":"adapted activation"):(ES(l)?"activación":"activation")),
      mk(l=>adapted
        ? (ES(l)?`<span class="vb">activación</span> — las mismas variables se re-extraen sobre el nuevo reclutamiento: latencia, meseta y pico vuelven a caer en rango pese a que la señal cruda es otra.`
                :`<span class="vb">activation</span> — the same variables are re-extracted over the new recruitment: latency, plateau and peak fall back in range even though the raw signal is a different one.`)
        : (ES(l)?`<span class="vb">activación</span> — del registro crudo se extraen las variables que alimentan la primitiva: <b>orden de reclutamiento, latencia de inicio, meseta, pico, envolvente y relación señal-ruido</b>. Que esas variables sobrevivan entre sesiones es el problema del que depende todo lo demás.`
                :`<span class="vb">activation</span> — from the raw recording, the variables that feed the primitive are extracted: <b>recruitment order, onset latency, plateau, peak, envelope and signal-to-noise ratio</b>. Whether those variables survive across sessions is the problem everything else depends on.`)),
      ()=>({track:getTrack(),node:buildHeat(pass.heat),
        cap:mk(l=>adapted?(ES(l)?"②′ activación adaptada":"②′ adapted activation"):(ES(l)?"② activación":"② activation")),accent:"b"}));
    steps.push({label:mk(l=>ES(l)?"dominio · procesado de señal":"domain · signal processing"),
      narr:null,dur:120,mount:async ctx=>{
        const r=domainBracket(getTrack(),1,2,mk(l=>ES(l)?"procesado de señal":"signal processing"));
        ctx.nodes.push(...r.nodes);await r.done;
      }});

    steps.push({label:mk(l=>ES(l)?"primitiva motora":"motor primitive"),
      narr:mk(l=>ES(l)
        ? `<span class="vi">primitiva motora</span> — el patrón corresponde a la primitiva de <b>«${PL("es")}»</b>. La prensión no abre secuencia: si hace falta, encadena después.`
        : `<span class="vi">motor primitive</span> — the pattern maps to the <b>"${PL("en")}"</b> primitive. Grasp never opens a sequence: if needed, it chains afterwards.`),
      dur:DWELL,mount:async ctx=>{
        const track=getTrack(),svg=buildPrimitive(SS.key,false);
        ctx.add(track,conn(false));
        const w=wrapCell(svg,mk(l=>(ES(l)?"primitiva · ":"primitive · ")+PL(l)),'i');ctx.add(track,w);
        S["prim"+P]=svg;autoscroll();requestAnimationFrame(()=>w.classList.add("in"));
      },undo:()=>{S["prim"+P]=null;}});

    steps.push({label:mk(l=>ES(l)?"prior biomecánico":"biomechanical prior"),
      narr:mk(l=>ES(l)
        ? `<span class="vi">prior biomecánico</span> — mientras se <b>${GE("es")}</b>, el espacio de gestos posibles no es el repertorio entero: quedan <b>3 vías</b> — ${SS.opts.map(o=>"«"+o.es+"»").join(" · ")}.`
        : `<span class="vi">biomechanical prior</span> — while the arm <b>${GE("en")}</b>, the space of possible gestures is not the whole repertoire: <b>3 routes</b> remain — ${SS.opts.map(o=>'"'+o.en+'"').join(" · ")}.`),
      dur:DWELL,mount:async ctx=>{
        const track=getTrack(),svg=buildPrior(d,0);
        ctx.add(track,conn(false));
        const w=wrapCell(svg,mk(l=>ES(l)?"prior biomecánico":"biomechanical prior"),'i');ctx.add(track,w);
        S["prior"+P]=svg;autoscroll();requestAnimationFrame(()=>w.classList.add("in"));
      },undo:()=>{S["prior"+P]=null;}});

    steps.push({label:mk(l=>ES(l)?"servos · arranque":"servos · start-up"),
      narr:mk(l=>ES(l)
        ? `<span class="vb">servos</span> — arrancan en grueso hacia <b>${sv(pass.coarse)}</b>, todavía sin saber cuál de las vías se va a ejecutar.`
        : `<span class="vb">servos</span> — they start coarsely towards <b>${sv(pass.coarse)}</b>, still not knowing which route will be executed.`),
      dur:DWELL,mount:async ctx=>{
        const track=getTrack(),box=buildServos(servoInit||null);
        ctx.add(track,conn(false));
        const w=wrapCell(box,mk(l=>servoInit?(ES(l)?"servos re-posicionados":"servos repositioned"):(ES(l)?"servos A·B·C":"servos A·B·C")),'b');
        ctx.add(track,w);S["servo"+P]=box;autoscroll();
        requestAnimationFrame(()=>{w.classList.add("in");setServos(box,pass.coarse);});
      },undo:()=>{S["servo"+P]=null;}});

    cellStep(mk(l=>ES(l)?"listener":"listener"),
      mk(l=>ES(l)
        ? `<span class="vl">listener</span> — escucha a la vez el estado que devuelven los servos y la aferencia, y compara con lo que el prior predecía.`
        : `<span class="vl">listener</span> — it listens at once to the state the servos return and to the afference, and compares them with what the prior predicted.`),
      ()=>({track:getTrack(),node:buildListener(false),cap:mk(l=>"listener"),accent:"l"}));

    steps.push({label:mk(l=>ES(l)?"el listener afina el prior":"listener narrows the prior"),
      narr:mk(l=>ES(l)
        ? `<span class="vl">listener</span> — engloba malla · activación · primitiva · prior · servos y <b>descarta «${ON(pass.drop,"es")}»</b>: el estado devuelto no encaja con esa vía. Quedan <b>2 vías</b>.`
        : `<span class="vl">listener</span> — it encircles mesh · activation · primitive · prior · servos and <b>discards "${ON(pass.drop,"en")}"</b>: the returned state does not fit that route. <b>2 routes</b> remain.`),
      dur:120,mount:async ctx=>{
        const track=getTrack();
        const{node,done}=ringOverlay(track,1,5,C.silver,false);
        if(node)ctx.nodes.push(node);
        setTimeout(()=>{if(S["prior"+P])renderPrior(S["prior"+P],d,1,null,pass.drop);},reduce?0:T(420));
        await done;
      },undo:()=>{if(S["prior"+P])renderPrior(S["prior"+P],d,0);}});

    steps.push({label:mk(l=>ES(l)?"retro servos → prior":"servo feedback → prior"),
      narr:mk(l=>ES(l)
        ? `<span class="vb">retroalimentación</span> — los servos corrigen a <b>${sv(pass.servos)}</b> y el prior se estrecha con cada corrección hasta quedar <b>una sola vía: «${ON(d.goal,"es")}»</b> — el brazo se extiende.`
        : `<span class="vb">feedback</span> — the servos correct to <b>${sv(pass.servos)}</b> and the prior narrows with every correction until <b>a single route remains: "${ON(d.goal,"en")}"</b> — the arm extends.`),
      dur:160,mount:async ctx=>{
        const track=getTrack();
        const r1=retroArc(track,4,6);if(r1.node)ctx.nodes.push(r1.node);
        setTimeout(()=>{if(S["servo"+P])setServos(S["servo"+P],pass.servos);},reduce?0:T(260));
        await r1.done;
        const r2=retroArc(track,4,6);if(r2.node)ctx.nodes.push(r2.node);
        setTimeout(()=>{if(S["prior"+P])renderPrior(S["prior"+P],d,2);},reduce?0:T(320));
        await r2.done;
      },undo:()=>{
        if(S["prior"+P])renderPrior(S["prior"+P],d,1,null,pass.drop);
        if(S["servo"+P])setServos(S["servo"+P],pass.coarse);
      }});

    // --- red generadora: N microciclos, cada uno con relectura de malla ---
    for(let ci=0;ci<CYCLES;ci++){
      const cy=pass.cycles[ci];
      const chainBase=pass.cycles.slice(0,ci).map(c=>({open:false,da:c.da}));
      steps.push({label:mk(l=>(ES(l)?"red generadora · ciclo ":"generative network · cycle ")+(ci+1)+"/"+CYCLES),
        narr:mk(l=>ci===0
          ? (ES(l)
            ? `<span class="vi">red generadora · ciclo 1</span> — <b>la malla se relee</b>: el reparto se desplaza —${mixShift(pass.mix[ci],pass.mix[ci+1],"es")}—. <b>Ninguno se apaga</b>: cambia el equilibrio, no el conjunto, y la primitiva <b>sigue siendo «${PL("es")}»</b>. Con la vía anterior bloqueada como contexto se abre un prior nuevo —${SB("es")}—, se resuelve, y los servos corrigen a <b>${sv(cy.servos)}</b>. <b>Este desenrollado es la red generadora</b>: el prior dice qué es admisible, la red decide cuál se despliega ahora dado lo ya bloqueado.`
            : `<span class="vi">generative network · cycle 1</span> — <b>the mesh is re-read</b>: the balance shifts —${mixShift(pass.mix[ci],pass.mix[ci+1],"en")}—. <b>Nothing switches off</b>: the balance changes, not the set, and the primitive is <b>still "${PL("en")}"</b>. With the previous route locked as context, a new prior opens —${SB("en")}—, resolves, and the servos correct to <b>${sv(cy.servos)}</b>. <b>This unrolling is the generative network</b>: the prior says what is admissible, the network decides which one unfolds now given what is already locked.`)
          : (ES(l)
            ? `<span class="vi">red generadora · ciclo ${ci+1}</span> — nueva relectura: ${mixShift(pass.mix[ci],pass.mix[ci+1],"es")}. La sinergia se despliega más, misma primitiva. Se encadena el eslabón <b>${ci+1}</b> sobre los anteriores y los servos vuelven a corregir a <b>${sv(cy.servos)}</b>. El <b>${MUO("es")}</b> nunca está en cero, así que no basta con que aparezca: solo si <b>arrancara primero y con pico alto</b> —orden y latencia, no mera presencia— el listener <b>reescribiría la primitiva</b> a «${OT("es")}» y el conjunto de opciones cambiaría entero.`
            : `<span class="vi">generative network · cycle ${ci+1}</span> — a fresh re-read: ${mixShift(pass.mix[ci],pass.mix[ci+1],"en")}. The synergy unfolds further, the same primitive. Link <b>${ci+1}</b> chains onto the previous ones and the servos correct again to <b>${sv(cy.servos)}</b>. The <b>${MUO("en")}</b> is never at zero, so its mere presence proves nothing: only if it <b>led the onset with a high peak</b> —order and latency, not presence— would the listener <b>rewrite the primitive</b> to "${OT("en")}" and the whole option set would change.`)),
        dur:200,mount:async ctx=>{
          const track=getTrack();
          if(ci===0){
            const c=cycleOverlay(track,4,6,mk(l=>ES(l)?"red generadora ×N · mientras la intención siga viva":"generative network ×N · while the intention holds"));
            ctx.nodes.push(...c.nodes);
          }
          if(S["mesh"+P]){const nm=buildMesh(pass.mix[ci+1]);S["mesh"+P].replaceWith(nm);S["mesh"+P]=nm;}
          flashCell(track,1,C.green);flashCell(track,6,C.silver);
          await wait(320);
          if(S["prior"+P])renderPrior(S["prior"+P],d,3,chainBase.concat([{open:true}]));
          await wait(340);
          if(S["prior"+P])renderPrior(S["prior"+P],d,3,chainBase.concat([{open:false,da:cy.da}]));
          if(S["servo"+P])setServos(S["servo"+P],cy.servos);
          const r=retroArc(track,4,6);if(r.node)ctx.nodes.push(r.node);
          await r.done;
        },
        undo:()=>{
          if(S["mesh"+P]){const om=buildMesh(pass.mix[ci]);S["mesh"+P].replaceWith(om);S["mesh"+P]=om;}
          if(S["prior"+P])renderPrior(S["prior"+P],d,ci===0?2:3,ci===0?null:pass.cycles.slice(0,ci).map(c=>({open:false,da:c.da})));
          if(S["servo"+P])setServos(S["servo"+P],ci===0?pass.servos:pass.cycles[ci-1].servos);
        }});
    }

    if(SS.holds){
      steps.push({label:mk(l=>ES(l)?"prensión encadenada":"chained grasp"),
        narr:mk(l=>ES(l)
          ? `<span class="vi">prensión</span> — <b>encadena sobre el ${PL("es")==="empujar"?"alcance":"agarre"}</b>: la vía elegida exige sostener la carga, así que la segunda primitiva se activa sin abrir secuencia propia.`
          : `<span class="vi">grasp</span> — it <b>chains onto the ${PL("en")==="push"?"reach":"pull"}</b>: the chosen route requires holding the load, so the second primitive activates without opening a sequence of its own.`),
        dur:DWELL,mount:async()=>{
          if(S["prim"+P])renderPrimitive(S["prim"+P],SS.key,true);
        },undo:()=>{if(S["prim"+P])renderPrimitive(S["prim"+P],SS.key,false);}});
    }
  }

  function divider(getTrack){
    steps.push({label:mk(l=>ES(l)?"frontera dentro / fuera del lazo":"in-loop / out-of-loop boundary"),narr:null,dur:170,mount:async ctx=>{
      const z=div("zdiv");
      z.appendChild(reg(div("zl"),()=>LANG==="es"?"dentro del lazo":"in-loop"));
      z.appendChild(div("vline"));
      z.appendChild(reg(div("zr"),()=>LANG==="es"?"fuera del lazo":"out-of-loop"));
      ctx.add(getTrack(),z);autoscroll();syncZoneBar();
    },undo:()=>syncZoneBar()});
  }

  const S={};
  if(!d.pert){
    steps.push({label:mk(l=>ES(l)?"fila":"row"),narr:null,dur:60,mount:async ctx=>{
      const r=rowShell("#"+String(d.n).padStart(2,"0"),mk(l=>ES(l)?"nominal":"nominal"),false);
      S.r1=r;ctx.add(S.block,r.row);autoscroll();
    },undo:()=>{S.r1=null;}});
    inSample(()=>S.r1.track,d.p1,"a",false,null);
    divider(()=>S.r1.track);
    cellStep(mk(l=>ES(l)?"cámaras":"cameras"),
      mk(l=>ES(l)
        ? `<span class="va">cámaras</span> — el registro externo certifica que el gesto ocurrió <b>en el mundo</b>, no solo en la predicción.`
        : `<span class="va">cameras</span> — the external record certifies that the gesture happened <b>in the world</b>, not only in the prediction.`),
      ()=>({track:S.r1.track,node:buildCamera(),cap:mk(l=>ES(l)?"cámaras · registro":"cameras · recording"),accent:"a",opts:{zone:"oos"}}));
    cellStep(mk(l=>ES(l)?"resultado":"outcome"),
      mk(l=>ES(l)
        ? `<span class="va">resultado</span> — <b>«${TK("es")}» ✓</b>${SS.holds?", con la carga sostenida":""}. Esto es lo único que tiene que mantenerse igual entre días.`
        : `<span class="va">outcome</span> — <b>"${TK("en")}" ✓</b>${SS.holds?", with the load held":""}. This is the only thing that has to stay the same across days.`),
      ()=>({track:S.r1.track,node:buildGesture(SS.dir,SS.holds),cap:mk(l=>ES(l)?"resultado ✓":"outcome ✓"),accent:"a",opts:{zone:"oos"}}));
    langTail(()=>S.r1.track,false);
    steps.push({label:mk(l=>ES(l)?"aferencia · cámara → sujeto":"afference · camera → subject"),
      narr:mk(l=>ES(l)
        ? `<span class="va">aferencia de la cámara</span> — <b>solo ahora</b>, ya recogida su respuesta, se le muestra el registro. La vía visual es lenta y <b>obliga a mirar</b>: por eso llega la última y no puede contaminar lo que dijo.`
        : `<span class="va">camera afference</span> — <b>only now</b>, with the answer already recorded, is the footage shown. The visual route is slow and <b>forces them to look</b>: that is why it comes last and cannot contaminate what they said.`),
      dur:140,mount:async ctx=>{
        const r=longArc(S.r1.track,0,8,{color:C.amber,top:16,height:40,dur:1000,width:1.4,marker:"url(#retAm)",
          labX:0.60,labTop:20,label:mk(l=>ES(l)?"⟵ aferencia visual · s":"⟵ visual afference · s")});
        ctx.nodes.push(...r.nodes);await r.done;
      }});
    steps.push({label:mk(l=>ES(l)?"cierre del lazo":"loop closed"),
      narr:mk(l=>ES(l)?`<b>cadena cerrada ✓</b> — la ruta fue nueva; el resultado, el mismo de siempre.`
                      :`<b>chain closed ✓</b> — the route was new; the outcome, the same as always.`),
      dur:120,mount:async ctx=>{
        const p=pulseRow(S.r1.track,false);if(p.node)ctx.nodes.push(p.node);
        await p.done;
        ctx.add(S.r1.track,reg(div("tag blue"),()=>LANG==="es"?"↩ retorno":"↩ return"));
      }});
    steps.push(treeStep(d));
  }else{
    steps.push({label:mk(l=>ES(l)?"fila · percepción":"row · perception"),narr:null,dur:60,mount:async ctx=>{
      const r=rowShell("#"+String(d.n).padStart(2,"0")+"·a",mk(l=>ES(l)?"perturbación":"perturbation"),true);
      S.r1=r;ctx.add(S.block,r.row);autoscroll();
    },undo:()=>{S.r1=null;}});
    inSample(()=>S.r1.track,d.p1,"a",false,null);
    divider(()=>S.r1.track);
    cellStep(mk(l=>ES(l)?"cambio externo súbito":"sudden external change"),
      mk(l=>ES(l)
        ? `<span class="vr">cambio externo súbito</span> — algo cambia <b>fuera del lazo</b> en pleno gesto: la carga no responde como el prior predecía.`
        : `<span class="vr">sudden external change</span> — something changes <b>outside the loop</b> mid-gesture: the load does not respond as the prior predicted.`),
      ()=>({track:S.r1.track,node:buildPert(),cap:mk(l=>ES(l)?"⚡ cambio externo súbito":"⚡ sudden external change"),accent:"r",opts:{red:true,drop:true,zone:"oos"}}));
    cellStep(mk(l=>ES(l)?"adaptación en tiempo real":"real-time adaptation"),
      mk(l=>ES(l)
        ? `<span class="vr">listener</span> — lo detecta por la <b>discrepancia</b> entre lo que predecía el prior y la aferencia que vuelve. No espera al final del gesto: <b>re-abre el prior</b> a sus 3 vías.`
        : `<span class="vr">listener</span> — it detects this from the <b>mismatch</b> between what the prior predicted and the afference coming back. It does not wait for the gesture to end: it <b>re-opens the prior</b> to its 3 routes.`),
      ()=>({track:S.r1.track,node:buildListener(true),cap:mk(l=>ES(l)?"adaptación en tiempo real":"real-time adaptation"),accent:"r",opts:{red:true,zone:"oos"}}));
    steps.push({label:mk(l=>ES(l)?"re-englobe y re-ruteo":"re-encircle and re-route"),
      narr:mk(l=>ES(l)
        ? `<span class="vr">re-ruteo</span> — re-engloba malla · activación · primitiva · prior · servos y lanza una pasada nueva <b>sin cambiar el objetivo</b>.`
        : `<span class="vr">re-route</span> — it re-encircles mesh · activation · primitive · prior · servos and launches a fresh pass <b>without changing the goal</b>.`),
      dur:160,mount:async ctx=>{

        const{node,done}=ringOverlay(track,1,6,C.red,true);
        if(node)ctx.nodes.push(node);

      },undo:()=>{if(S.priora)renderPrior(S.priora,d,2);}});
    steps.push({label:mk(l=>ES(l)?"fila · pasada adaptada":"row · adapted pass"),narr:null,dur:60,mount:async ctx=>{
      const r=rowShell("#"+String(d.n).padStart(2,"0")+"·b",mk(l=>ES(l)?"pasada adaptada":"adapted pass"),true);
      S.r2=r;ctx.add(S.block,r.row);autoscroll();
    },undo:()=>{S.r2=null;}});
    inSample(()=>S.r2.track,d.p2,"b",true,d.p1.servos);
    divider(()=>S.r2.track);
    cellStep(mk(l=>ES(l)?"cámaras":"cameras"),
      mk(l=>ES(l)?`<span class="va">cámaras</span> — certifican el gesto <b>adaptado</b>: ocurrió, y ocurrió bien.`
                 :`<span class="va">cameras</span> — they certify the <b>adapted</b> gesture: it happened, and it happened well.`),
      ()=>({track:S.r2.track,node:buildCamera(),cap:mk(l=>ES(l)?"cámaras · registro":"cameras · recording"),accent:"a",opts:{zone:"oos"}}));

      mk(l=>ES(l)
        ? `<span class="va">resultado</span> — <b>«${TK("es")}» ✓</b>: el mismo resultado, alcanzado con otro reclutamiento y otros ángulos.`
        : `<span class="va">outcome</span> — <b>"${TK("en")}" ✓</b>: the same outcome, reached with different recruitment and different angles.`),
      ()=>({track:S.r2.track,node:buildGesture(SS.dir,SS.holds),cap:mk(l=>ES(l)?"resultado ✓ · adaptado":"outcome ✓ · adapted"),accent:"a",opts:{zone:"oos"}}));
    langTail(()=>S.r2.track,true);
    steps.push({label:mk(l=>ES(l)?"aferencia · cámara → sujeto":"afference · camera → subject"),
      narr:mk(l=>ES(l)?`<span class="va">aferencia de la cámara</span> — <b>solo ahora</b> se le muestra el registro, con su respuesta ya recogida. Si menciona por su cuenta la perturbación, se anota como comentario espontáneo.`
                      :`<span class="va">camera afference</span> — <b>only now</b> is the footage shown, with the answer already recorded. If the subject brings up the perturbation unprompted, it is logged as a spontaneous remark.`),
      dur:140,mount:async ctx=>{
        const r=longArc(S.r2.track,0,8,{color:C.amber,top:16,height:40,dur:1000,width:1.4,marker:"url(#retAm)",
          labX:0.60,labTop:20,label:mk(l=>ES(l)?"⟵ aferencia visual · s":"⟵ visual afference · s")});
        ctx.nodes.push(...r.nodes);await r.done;
      }});
    steps.push({label:mk(l=>ES(l)?"cierre del lazo":"loop closed"),
      narr:mk(l=>ES(l)?`<b>cadena cerrada con re-ruteo ✓</b> — la ruta cambió por completo; el resultado, no.`
                      :`<b>chain closed with a re-route ✓</b> — the route changed completely; the outcome did not.`),
      dur:120,mount:async ctx=>{
        const p=pulseRow(S.r2.track,true);if(p.node)ctx.nodes.push(p.node);
        await p.done;
        ctx.add(S.r2.track,reg(div("tag red"),()=>LANG==="es"?"↩ aferente":"↩ afferent"));
      }});
    steps.push(treeStep(d));
  }
  return{steps,S};
}

/* ---------- narración ---------- */
function pushNarr(fn,n){
  const e=consoleBody.querySelector(".cempty");if(e)e.remove();
  const c=div("cline"),m=div("m","#"+String(n).padStart(2,"0")+" ▸"),b=document.createElement("span");
  regHTML(b,typeof fn==="function"?fn:()=>fn);c.appendChild(m);c.appendChild(b);consoleBody.appendChild(c);
  requestAnimationFrame(()=>c.classList.add("in"));
  consoleBody.scrollTop=consoleBody.scrollHeight;
}
function emptyConsole(){
  consoleBody.innerHTML="";
  const e=div("cempty");consoleBody.appendChild(reg(e,()=>LANG==="es"?"Sin historia todavía.":"No story yet."));
}
function popNarr(){
  const all=consoleBody.querySelectorAll(".cline");
  if(all.length)all[all.length-1].remove();
  if(!consoleBody.querySelector(".cline"))emptyConsole();
}
function printStory(rec){
  consoleBody.innerHTML="";
  const lines=rec.steps.filter(s=>s.narr).map(s=>s.narr);
  if(!lines.length){emptyConsole();return;}
  lines.forEach((fn,i)=>{
    const c=div("cline"),m=div("m","#"+String(rec.d.n).padStart(2,"0")+" ▸"),b=document.createElement("span");
    regHTML(b,typeof fn==="function"?fn:()=>fn);c.appendChild(m);c.appendChild(b);consoleBody.appendChild(c);
    setTimeout(()=>c.classList.add("in"),reduce?0:T(80*i));
  });
  consoleBody.scrollTop=0;
}
function selectBlock(b){
  if(selBlock)selBlock.classList.remove("sel");
  selBlock=b;b.classList.add("sel");
  const rec=blockData.get(b);if(rec)printStory(rec);
}

/* ---------- árbol ---------- */
function animDraw(p){
  if(reduce)return;
  const L=p.getTotalLength();
  p.style.strokeDasharray=L+"px";p.style.strokeDashoffset=L+"px";p.getBoundingClientRect();
  p.style.transition=`stroke-dashoffset ${(.7/speed).toFixed(2)}s ease`;
  requestAnimationFrame(()=>p.style.strokeDashoffset="0px");
}
function tlabel(x,y,n,fork){
  const t=el("text",{x:Math.min(x+6,RAIL-4),y:(y-4).toFixed(1),fill:fork?"#c9714f":"#6f88a0","font-size":7.5,"font-family":FONT},treeG);
  t.textContent="r"+String(n).padStart(2,"0");
}
function drawBranch(x0,y0,y1,s,newest){
  if(!s.pert){
    const mx=(x0+RAIL)/2;
    const p=el("path",{d:`M ${x0} ${y0} C ${mx} ${y0}, ${mx} ${y1.toFixed(1)}, ${RAIL} ${y1.toFixed(1)}`,fill:"none",stroke:C.blue,"stroke-width":1.8,opacity:.55},treeG);
    el("circle",{cx:RAIL,cy:y1.toFixed(1),r:2.6,fill:C.blue},treeG);
    tlabel(RAIL-40,y1,s.n,false);
    if(newest)animDraw(p);
  }else{
    const fx=x0+(RAIL-x0)*.6,fy=(y0+y1)/2,mx=(x0+fx)/2;
    const p0=el("path",{d:`M ${x0} ${y0} C ${mx} ${y0}, ${mx} ${fy.toFixed(1)}, ${fx.toFixed(1)} ${fy.toFixed(1)}`,fill:"none",stroke:C.red,"stroke-width":1.8,opacity:.7},treeG);
    const fc=el("circle",{cx:fx.toFixed(1),cy:fy.toFixed(1),r:2.7,fill:C.red},treeG);fc.style.filter="drop-shadow(0 0 4px rgba(240,96,74,.7))";
    const yA=y1-9,yB=y1+9,mx2=(fx+RAIL)/2;
    const pA=el("path",{d:`M ${fx.toFixed(1)} ${fy.toFixed(1)} C ${mx2} ${fy.toFixed(1)}, ${mx2} ${yA.toFixed(1)}, ${RAIL} ${yA.toFixed(1)}`,fill:"none",stroke:C.red,"stroke-width":1.5,opacity:.6},treeG);
    const pB=el("path",{d:`M ${fx.toFixed(1)} ${fy.toFixed(1)} C ${mx2} ${fy.toFixed(1)}, ${mx2} ${yB.toFixed(1)}, ${RAIL} ${yB.toFixed(1)}`,fill:"none",stroke:C.red,"stroke-width":1.5,opacity:.6},treeG);
    el("circle",{cx:RAIL,cy:yA.toFixed(1),r:2.3,fill:C.blue},treeG);
    el("circle",{cx:RAIL,cy:yB.toFixed(1),r:2.3,fill:C.blue},treeG);
    tlabel(fx-4,fy-5,s.n,true);
    const settle=()=>[pA,pB].forEach(pp=>{pp.setAttribute("stroke",C.blue);pp.style.opacity=.5;});
    if(newest){animDraw(p0);animDraw(pA);animDraw(pB);setTimeout(settle,reduce?0:T(850));}else settle();
  }
}
function redrawTree(){
  treeG.innerHTML="";
  const H=170,rootX=26,rootY=H/2;
  el("line",{x1:RAIL,y1:22,x2:RAIL,y2:H-22,stroke:"#3a2e18","stroke-width":1.4},treeG);
  const rl=el("text",{x:RAIL+6,y:H/2,fill:"#8a6a2e","font-size":8,"font-family":FONT},treeG);rl.textContent=LANG==="es"?"resultado":"outcome";
  const rc=el("circle",{cx:rootX,cy:rootY,r:4.5,fill:C.soft},treeG);rc.style.filter="drop-shadow(0 0 4px rgba(113,130,123,.5))";
  const rt=el("text",{x:rootX-8,y:rootY+16,fill:"#47554F","font-size":7.5,"font-family":FONT},treeG);rt.textContent=LANG==="es"?"raíz":"root";
  const n=strat.length;
  if(!n){const h=el("text",{x:rootX+20,y:rootY+3,fill:"#47554F","font-size":8.5,"font-family":FONT},treeG);h.textContent=LANG==="es"?"— sin rutas —":"— no routes —";return;}
  strat.forEach((s,i)=>drawBranch(rootX,rootY,n===1?rootY:26+(H-52)*(i/(n-1)),s,i===n-1));
}

/* ---------- motor de pasos ---------- */
function updateStepUI(){
  const n=cur?cur.steps.length:0,i=cur?cur.idx:0;
  stepNum.textContent=i+" / "+n;
  const lb=cur&&i>0?cur.steps[i-1].label:null;
  stepLab.textContent=lb?(typeof lb==="function"?lb():lb):"—";
  navgrp.classList.toggle("live",!!cur&&!anim);
  btnPrev.disabled=!cur||i<=0||anim;
  btnNext.disabled=!cur||i>=n||anim;
}
async function nextStep(){
  if(!cur||anim||cur.idx>=cur.steps.length)return;
  anim=true;updateStepUI();
  const st=cur.steps[cur.idx],ctx={nodes:[],add(p,n){p.appendChild(n);this.nodes.push(n);return n;}};
  cur.ctxs[cur.idx]=ctx;
  await st.mount(ctx);
  if(st.narr)pushNarr(st.narr,cur.d.n);
  cur.idx++;
  anim=false;updateStepUI();
}
function prevStep(){
  if(!cur||anim||cur.idx<=0)return;
  cur.idx--;
  const st=cur.steps[cur.idx],ctx=cur.ctxs[cur.idx];
  if(ctx)ctx.nodes.slice().reverse().forEach(n=>{if(n.parentNode)n.remove();});
  if(st.undo)st.undo();
  if(st.narr)popNarr();
  updateStepUI();
}
async function playAll(){
  while(cur&&cur.idx<cur.steps.length){
    const dur=cur.steps[cur.idx].dur??DWELL;
    await nextStep();
    await wait(dur);
  }
}

function addLogRow(d){
  const e=logBody.querySelector(".empty");if(e)e.remove();
  const P=d.pert,p1=d.p1,p2=d.p2;
  const servT=p=>`${p.servos[0].ang}° ${p.servos[1].ang}° ${p.servos[2].ang}°`;
  const priT=p=>`−«${d.ex.opts[p.drop][LANG]}» → «${d.ex.opts[d.goal][LANG]}» +${CYCLES}`;
  const dual=(f1,f2)=>()=>`<span class="pa"><span class="pfx">a</span>${f1()}</span><br>`+
                          `<span class="pb"><span class="pfx">b</span>${f2()}</span>`;
  const chainOf=p=>p.cycles.map(c=>({open:false,da:c.da}));
  // la tira, en pequeño: los cuadrados que de verdad cambian
  const strip=(...nodes)=>{
    const w=div("thumbs");
    nodes.forEach((n,i)=>{
      if(n==="→"){const a=div("tarrow");a.textContent="→";w.appendChild(a);}
      else w.appendChild(thumbOf(n));

    return w;
  };
  const tr=document.createElement("tr");
  if(P)tr.className="pert";
  const cells=[
    ["c-n",()=>"#"+String(d.n).padStart(2,"0")+(P?(LANG==="es"?" · perturbada":" · perturbed"):""),false,null],
    ["c-want",()=>"«"+d.ex.task[LANG]+"»",false,null],
    ["c-sens",P?dual(()=>mixShort(p1.mix[0])+" → "+mixShort(p1.mix[CYCLES]),
                     ()=>mixShort(p2.mix[0])+" → "+mixShort(p2.mix[CYCLES]))
              :()=>mixShort(p1.mix[0])+" → "+mixShort(p1.mix[CYCLES]),P,
     ()=>P?[strip(buildMesh(p1.mix[0]),"→",buildMesh(p1.mix[CYCLES])),
            strip(buildMesh(p2.mix[0]),"→",buildMesh(p2.mix[CYCLES]))]
          :[strip(buildMesh(p1.mix[0]),"→",buildMesh(p1.mix[CYCLES]))]],
    ["c-prim",()=>`<b>«${d.ex.prim.label[LANG]}»</b><br><span class="stable">${tx(D.stable)}</span>`,true,
     ()=>P?[strip(buildHeat(p1.heat),buildHeat(p2.heat))]
          :[strip(buildHeat(p1.heat))]],
    ["c-serv",P?dual(()=>servT(p1),()=>servT(p2)):()=>servT(p1),P,
     ()=>P?[strip(buildServoGlyph(p1.servos)),strip(buildServoGlyph(p2.servos))]
          :[strip(buildServoGlyph(p1.servos))]],
    ["c-pri",P?dual(()=>priT(p1),()=>priT(p2)):()=>priT(p1),P,
     ()=>P?[strip(buildPriorThumb(d,chainOf(p1))),strip(buildPriorThumb(d,chainOf(p2)))]
          :[strip(buildPriorThumb(d,chainOf(p1)))]],
    ["c-ges",()=>"«"+d.ex.task[LANG]+"» ✓",false,
     ()=>[strip(buildGesture(d.ex.dir,d.ex.holds))]],
    ["c-cam",()=>tx(D.camOK),false,null],
    ["c-say",()=>tx(D.sayOK),false,null],
    ["c-res",()=>"✓",false,null]
  ];
  cells.forEach(([cls,f,html,thumbs])=>{
    const td=document.createElement("td");td.className=cls;
    const txtSpan=document.createElement("span");
    if(html)regHTML(txtSpan,f);else reg(txtSpan,f);
    td.appendChild(txtSpan);
    if(thumbs)thumbs().forEach(t=>td.appendChild(t));
    tr.appendChild(td);
  });
  logBody.appendChild(tr);
  logRows.push(tr);
  while(logRows.length>WINDOW){const old=logRows.shift();if(old.parentNode)old.remove();}
  updateTblSub();
}
function removeLogRow(n){
  const idx=logRows.findIndex(r=>r._n===n);
  if(idx>=0){const r=logRows.splice(idx,1)[0];if(r.parentNode)r.remove();}
  if(!logRows.length)emptyTable();
  updateTblSub();
}

/* ---------- flujo ---------- */
function trimWindow(){
  while(strat.length>WINDOW){
    strat.shift();
    const first=ledger.querySelector(".block");
    if(first){
      if(first===selBlock)selBlock=null;
      if(cur&&cur.block===first)cur=null;
      blockData.delete(first);
      first.classList.add("out");setTimeout(()=>first.remove(),300);
    }
  }
}
function updateStatus(){
  cIter.textContent=iter;cOos.textContent=oos;
  treeSub.textContent=strat.length
    ?(LANG==="es"?`${strat.length} ruta(s) registradas`:`${strat.length} route(s) logged`)
    :(LANG==="es"?"sin rutas todavía":"no routes yet");
}
function setMode(on){
  perturb=on;
  sw.classList.toggle("on",on);btnNew.classList.toggle("armed",on);led.classList.toggle("oos",on);
  modeTxt.textContent=on?(LANG==="es"?"cambio externo armado":"external change armed"):(LANG==="es"?"modo nominal":"nominal mode");
}
function lock(on){btnNew.disabled=on;btnReset.disabled=on;chk.disabled=on;}

async function finishCurrent(){
  const prevSpeed=speed;speed=60;          // efectivamente instantáneo, no una reproducción
  while(cur&&cur.idx<cur.steps.length)await nextStep();
  speed=prevSpeed;
}
async function stamp(pert){
  if(anim)return;
  if(cur&&cur.idx<cur.steps.length){lock(true);await finishCurrent();lock(false);}
  const h0=ledger.querySelector(".hint");if(h0)h0.remove();
  pickExample();
  iter++;if(pert)oos++;
  const d=genData(pert);
  const block=div("block"+(pert?" pert":""));
  ledger.appendChild(block);
  block.addEventListener("click",()=>selectBlock(block));
  const{steps,S}=buildSteps(d);
  S.block=block;
  const rec={d,steps};
  blockData.set(block,rec);
  cur={block,d,steps,ctxs:new Array(steps.length),idx:0};
  if(selBlock)selBlock.classList.remove("sel");
  selBlock=block;block.classList.add("sel");
  emptyConsole();

  updateStatus();updateStepUI();

  if(stepMode){await nextStep();}
  else{lock(true);await playAll();lock(false);}
  updateStepUI();
}
function reset(){
  if(anim)return;
  iter=0;oos=0;strat.length=0;selBlock=null;cur=null;blockData.clear();
  const bar=$("#zonebar");
  ledger.innerHTML="";
  ledger.appendChild(bar);
  ledger.appendChild(reg(div("hint"),()=>LANG==="es"?"Pulsa «nueva interacción» para imprimir la primera fila.":"Press \u201cnew interaction\u201d to print the first row."));
  emptyConsole();
  logRows.length=0;emptyTable();newSession();redrawTree();updateStatus();updateStepUI();syncZoneBar();
}

btnNew.addEventListener("click",()=>stamp(perturb));
btnReset.addEventListener("click",reset);
chk.addEventListener("change",e=>setMode(e.target.checked));
function setStepMode(on){
  stepMode=on;
  chkStep.checked=on;
  swStep.classList.toggle("on",on);
  $("#stepModeTxt").textContent=on?(LANG==="es"?"avance manual · activado":"manual advance · on"):(LANG==="es"?"reproducción automática":"automatic playback");
}
chkStep.addEventListener("change",e=>setStepMode(e.target.checked));
btnNext.addEventListener("click",nextStep);
btnPrev.addEventListener("click",prevStep);
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT")return;
  if(e.key==="ArrowRight"){e.preventDefault();nextStep();}
  if(e.key==="ArrowLeft"){e.preventDefault();prevStep();}
});
document.querySelectorAll(".intsel .isb").forEach(b=>{
  b.addEventListener("click",()=>{
    fixedTask=parseInt(b.dataset.t,10);
    document.querySelectorAll(".intsel .isb").forEach(o=>o.classList.toggle("on",o===b));
  });
});
$("#langEs").addEventListener("click",()=>setLang("es"));
$("#langEn").addEventListener("click",()=>setLang("en"));
const spd=$("#spd"),spdVal=$("#spdVal");
spd.addEventListener("input",()=>{
  speed=parseFloat(spd.value);
  document.documentElement.style.setProperty("--spd",speed);
  spdVal.textContent=speed.toFixed(2).replace(/0$/,"")+"×";
});

document.documentElement.style.setProperty("--spd",speed);
applyI18n();
emptyTable();
reg($("#hint0"),()=>LANG==="es"?"Pulsa «nueva interacción» para imprimir la primera fila.":"Press \u201cnew interaction\u201d to print the first row.");
setMode(false);
setStepMode(chkStep.checked);
newSession();redrawTree();updateStatus();updateStepUI();
</script>
</body>
</html>
